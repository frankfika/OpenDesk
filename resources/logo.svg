<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="45%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Outer subtle border -->
  <rect x="44" y="44" width="936" height="936" rx="196" ry="196" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="4"/>

  <!-- Monitor / Desk window -->
  <g filter="url(#softShadow)">
    <!-- Screen body -->
    <rect x="172" y="180" width="680" height="520" rx="56" ry="56" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="172" y="180" width="680" height="520" rx="56" ry="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="4"/>

    <!-- Title bar -->
    <rect x="172" y="180" width="680" height="92" rx="56" ry="56" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="172" y="232" width="680" height="40" fill="#FFFFFF" fill-opacity="0.06"/>

    <!-- Window dots -->
    <circle cx="252" cy="226" r="16" fill="#FF6B6B"/>
    <circle cx="308" cy="226" r="16" fill="#FFD93D"/>
    <circle cx="364" cy="226" r="16" fill="#6BCB77"/>

    <!-- Content lines -->
    <rect x="236" y="320" width="360" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.20"/>
    <rect x="236" y="378" width="552" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.13"/>
    <rect x="236" y="432" width="480" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.13"/>
    <rect x="236" y="486" width="400" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.13"/>
    <rect x="236" y="540" width="280" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.20"/>

    <!-- Monitor stand neck -->
    <rect x="472" y="700" width="80" height="64" rx="12" fill="#FFFFFF" fill-opacity="0.12"/>
    <!-- Monitor stand base -->
    <rect x="392" y="764" width="240" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.15"/>
  </g>

  <!-- AI Sparkle / Star -->
  <g filter="url(#glow)">
    <!-- 4-point star -->
    <path d="M 760 200
             C 760 200, 784 288, 784 288
             C 784 288, 872 312, 872 312
             C 872 312, 784 336, 784 336
             C 784 336, 760 424, 760 424
             C 760 424, 736 336, 736 336
             C 736 336, 648 312, 648 312
             C 648 312, 736 288, 736 288
             C 736 288, 760 200, 760 200 Z" fill="url(#accent)"/>

    <!-- Center core -->
    <circle cx="760" cy="312" r="42" fill="#FFFFFF"/>
    <circle cx="760" cy="312" r="26" fill="#0EA5E9"/>
    <circle cx="760" cy="312" r="12" fill="#FFFFFF" fill-opacity="0.8"/>
  </g>

  <!-- Connection dot from screen to sparkle -->
  <path d="M 680 360 Q 720 360, 736 336" stroke="#67E8F9" stroke-width="5" stroke-opacity="0.7" stroke-linecap="round" fill="none"/>
  <circle cx="680" cy="360" r="8" fill="#67E8F9"/>
</svg>
